services:
  - type: web
    name: kite-alerts
    runtime: python
    plan: starter
    healthCheckPath: /status
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --timeout 120
    envVars:
      - key: KITE_API_KEY
        sync: false
      - key: KITE_API_SECRET
        sync: false
      - key: KITE_ACCESS_TOKEN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: NIFTY_INSTRUMENT
        value: "NSE:NIFTY 50"
      - key: SENSEX_INSTRUMENT
        value: "BSE:SENSEX"
      - key: BANKNIFTY_INSTRUMENT
        value: "NSE:NIFTY BANK"
      - key: CRUDEOIL_INSTRUMENT
        value: "MCX:CRUDEOIL26APRFUT"
      - key: RENDER_EXTERNAL_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.13.0"
